stages:
  - validate
  - build
  - test
  - deploy

# Global configuration for Windows long path support
variables:
  GIT_DEPTH: 1

.setup_java: &setup_java
  before_script:
    - git config --global core.longpaths true
    - git config --global advice.nameTooLong false
    - |
      if [ -f "ci/setup-java.sh" ]; then
        bash ci/setup-java.sh
      else
        echo "No setup-java.sh found, skipping"
      fi

.docker_job_template: &docker_job_template
  image: docker:latest
  services:
    - docker:dind
  before_script:
    - echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

.test_template: &test_template
  <<: *setup_java
  variables:
    GIT_CLEAN_FLAGS: none
    CI_TEST_MODE: "H2"
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  only:
    - main
    - dev
    - testing-branch

.setup_node: &setup_node
  image: node:20-alpine
  before_script:
    - apk add --no-cache git
    - git config --global core.longpaths true
    - git config --global advice.nameTooLong false
  cache:
    key: npm-cache
    paths:
      - frontend/node_modules/
  only:
    - main
    - dev
    - testing-branch

# ============================================================================
# BACKEND JOBS
# ============================================================================

backend:validate:
  stage: validate
  <<: *setup_java
  variables:
    GIT_CLEAN_FLAGS: none
  script:
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew --version
    - java -version
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  only:
    - main
    - dev
    - testing-branch

backend:build:
  stage: build
  <<: *setup_java
  needs: ["backend:validate"]
  variables:
    GIT_CLEAN_FLAGS: none
  script:
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew assemble -x test
  artifacts:
    expire_in: 7 days
    paths:
      - backend/build/libs/*.jar
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  only:
    - main
    - dev
    - testing-branch

# Unit Tests - Fast, isolated tests (business logic)
backend:test:unit:
  <<: *test_template
  stage: test
  needs: ["backend:build"]
  script:
    - echo "Running unit tests..."
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew test --tests "com.krasen.vizor.business.*" jacocoTestReport --info
    # Copy execution data with unique name for merging
    - mkdir -p build/jacoco/merge
    - cp build/jacoco/test.exec build/jacoco/merge/unit.exec || echo "No execution data generated"
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/jacoco/test/html/
      - backend/build/reports/tests/test/
      - backend/build/jacoco/merge/unit.exec
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/build/reports/jacoco/test/jacocoTestReport.xml
  coverage: '/Total.*?([0-9]{1,3})%/'

# Integration Tests - API tests with database
backend:test:integration:
  <<: *test_template
  stage: test
  needs: ["backend:build"]
  script:
    - echo "Running integration tests..."
    - cd backend
    - chmod +x ./gradlew
    - ./gradlew test --tests "com.krasen.vizor.integration.*" jacocoTestReport --info
    # Copy execution data with unique name for merging
    - mkdir -p build/jacoco/merge
    - cp build/jacoco/test.exec build/jacoco/merge/integration.exec || echo "No execution data generated"
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/jacoco/test/html/
      - backend/build/reports/tests/test/
      - backend/build/jacoco/merge/integration.exec
    reports:
      junit: backend/build/test-results/test/TEST-*.xml
      coverage_report:
        coverage_format: cobertura
        path: backend/build/reports/jacoco/test/jacocoTestReport.xml
  coverage: '/Total.*?([0-9]{1,3})%/'

# SonarQube Analysis - Uses existing coverage from test jobs, merges and uploads
backend:sonarqube:
  <<: *test_template
  stage: test
  needs: 
    - backend:build
    - backend:test:unit
    - backend:test:integration
  variables:
    GIT_CLEAN_FLAGS: none
    CI_TEST_MODE: "H2"
    SONAR_HOST_URL: ${SONAR_HOST_URL:-https://sonarcloud.io}
  script:
    - echo "Merging coverage reports from unit and integration tests..."
    # Check for artifacts before cd (artifacts are relative to project root)
    - echo "Checking for execution data files from project root..."
    - ls -la backend/build/jacoco/merge/ 2>/dev/null || echo "No merge directory found yet"
    - cd backend
    - chmod +x ./gradlew
    # Ensure jacoco merge directory exists
    - mkdir -p build/jacoco/merge
    # Artifacts are downloaded to backend/build/jacoco/merge/*.exec from project root
    # Since we're now in backend/, the files should be at build/jacoco/merge/*.exec
    # But GitLab downloads artifacts relative to project root, so they might be at ../backend/build/jacoco/merge/
    # Actually, artifacts are placed at the exact path specified, so backend/build/jacoco/merge/unit.exec
    # from project root becomes backend/build/jacoco/merge/unit.exec, and from backend/ it's build/jacoco/merge/unit.exec
    # List what we have for debugging
    - echo "Checking for execution data files in backend directory..."
    - ls -la build/jacoco/merge/ || echo "No merge directory found"
    - find build/jacoco -name "*.exec" -type f || echo "No .exec files found"
    # Ensure classes are compiled (needed for coverage report generation)
    - ./gradlew compileJava processResources --info || echo "Compilation check completed"
    # Generate combined report directly from all .exec files (no explicit merge task)
    - |
      if [ -f "build/jacoco/merge/unit.exec" ] || [ -f "build/jacoco/merge/integration.exec" ]; then
        echo "Found execution data files, generating combined report..."
        ./gradlew jacocoMergedReport --info || echo "Report generation failed, continuing..."
      else
        echo "Warning: No execution data files found. SonarQube will run without coverage."
      fi
    # Run SonarQube analysis with the merged coverage report
    - |
      if [ -n "${SONAR_TOKEN:-}" ]; then
        echo "Uploading results to SonarQube with merged coverage..."
        SONAR_ARGS="-Dsonar.host.url=${SONAR_HOST_URL:-https://sonarcloud.io} -Dsonar.token=${SONAR_TOKEN}"
        if [ -n "${SONAR_ORGANIZATION:-}" ]; then
          SONAR_ARGS="$SONAR_ARGS -Dsonar.organization=${SONAR_ORGANIZATION}"
        fi
        if [ -n "${SONAR_PROJECT_KEY:-}" ]; then
          SONAR_ARGS="$SONAR_ARGS -Dsonar.projectKey=${SONAR_PROJECT_KEY}"
        fi
        # Use the merged coverage report
        ./gradlew sonar $SONAR_ARGS || echo "SonarQube analysis failed, but continuing..."
      else
        echo "SONAR_TOKEN not set, skipping SonarQube analysis"
      fi
  artifacts:
    expire_in: 30 days
    paths:
      - backend/build/reports/jacoco/merged/
      - backend/build/reports/sonar/
  cache:
    key: gradle-cache
    paths:
      - backend/.gradle/
  allow_failure: false
  only:
    - main
    - dev
    - testing-branch

# Deploy Stage - Build and push Docker images
deploy:backend:build:
  <<: *docker_job_template
  stage: deploy
  needs: 
    - backend:test:unit
    - backend:test:integration
    - backend:sonarqube
  script:
    - cd backend
    - |
      IMAGE_TAG="${CI_COMMIT_REF_SLUG:-latest}"
      IMAGE_NAME="$DOCKER_USERNAME/vizor-backend:$IMAGE_TAG"
      docker build -t "$IMAGE_NAME" .
      docker tag "$IMAGE_NAME" "$DOCKER_USERNAME/vizor-backend:latest"
  artifacts:
    expire_in: 1 day
    paths:
      - backend/Dockerfile
  only:
    - main
    - dev
    - testing-branch

deploy:backend:push:
  <<: *docker_job_template
  stage: deploy
  needs: ["deploy:backend:build"]
  script:
    - |
      IMAGE_TAG="${CI_COMMIT_REF_SLUG:-latest}"
      IMAGE_NAME="$DOCKER_USERNAME/vizor-backend:$IMAGE_TAG"
      docker push "$IMAGE_NAME"
      docker push "$DOCKER_USERNAME/vizor-backend:latest"
  only:
    - main
    - dev
    - testing-branch

# ============================================================================
# FRONTEND JOBS
# ============================================================================

frontend:validate:
  <<: *setup_node
  stage: validate
  variables:
    GIT_CLEAN_FLAGS: none
  script:
    - cd frontend
    - node --version
    - npm --version
    - npm ci
  only:
    - main
    - dev
    - testing-branch

frontend:build:
  <<: *setup_node
  stage: build
  needs: ["frontend:validate"]
  variables:
    GIT_CLEAN_FLAGS: none
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    expire_in: 7 days
    paths:
      - frontend/dist/
  only:
    - main
    - dev
    - testing-branch

# Frontend SonarQube Analysis
frontend:sonarqube:
  image: sonarsource/sonar-scanner-cli:latest
  stage: test
  needs: 
    - frontend:build
    - frontend:test:e2e
  variables:
    GIT_CLEAN_FLAGS: none
    SONAR_HOST_URL: ${SONAR_HOST_URL:-https://sonarcloud.io}
  before_script:
    - cd frontend
  script:
    - |
      if [ -z "${SONAR_TOKEN:-}" ]; then
        echo "Warning: SONAR_TOKEN not set. Skipping SonarQube analysis."
        exit 0
      fi
      echo "Running SonarQube analysis for frontend with E2E coverage..."
      # Check if coverage file exists
      if [ -f "coverage/lcov.info" ]; then
        echo "Coverage file found: coverage/lcov.info"
      else
        echo "Warning: Coverage file not found. SonarQube will run without coverage data."
      fi
      sonar-scanner \
        -Dsonar.host.url=${SONAR_HOST_URL:-https://sonarcloud.io} \
        -Dsonar.token=${SONAR_TOKEN} \
        -Dsonar.projectKey=${SONAR_PROJECT_KEY_FRONTEND:-vizor-frontend} \
        -Dsonar.organization=${SONAR_ORGANIZATION:-} \
        -Dsonar.sources=src \
        -Dsonar.sourceEncoding=UTF-8 \
        -Dsonar.exclusions="**/node_modules/**,**/dist/**,**/build/**,**/*.config.*,**/vite-env.d.ts" \
        -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info \
        -Dsonar.coverage.exclusions="**/*.cy.ts,**/cypress/**,**/*.test.ts,**/*.spec.ts,**/main.tsx,**/vite-env.d.ts" || \
        echo "SonarQube analysis completed with warnings"
  artifacts:
    expire_in: 30 days
    paths:
      - frontend/coverage/
  allow_failure: true
  only:
    - main
    - dev
    - testing-branch

# E2E Tests - Placeholder that passes (remove the SKIP_E2E line to enable real tests)
frontend:test:e2e:
  <<: *setup_node
  stage: test
  needs: ["frontend:build"]
  variables:
    GIT_CLEAN_FLAGS: none
    SKIP_E2E: "true"  # Remove this line to enable real e2e tests
  script:
    - |
      if [ "$SKIP_E2E" = "true" ]; then
        echo "E2E tests are currently skipped. Remove SKIP_E2E variable to enable."
        echo "When ready, uncomment the e2e test commands below:"
        echo "# cd frontend"
        echo "# npm ci"
        echo "# npm run test:e2e"
        exit 0
      else
        echo "Running E2E tests..."
        cd frontend
        npm ci
        npm run test:e2e
      fi
  only:
    - main
    - dev
    - testing-branch





# Deploy Stage - Build and push Docker images
deploy:frontend:build:
  <<: *docker_job_template
  stage: deploy
  needs: ["frontend:test:e2e"]
  script:
    - cd frontend
    - |
      IMAGE_TAG="${CI_COMMIT_REF_SLUG:-latest}"
      IMAGE_NAME="$DOCKER_USERNAME/vizor-frontend:$IMAGE_TAG"
      docker build -t "$IMAGE_NAME" .
      docker tag "$IMAGE_NAME" "$DOCKER_USERNAME/vizor-frontend:latest"
  artifacts:
    expire_in: 1 day
    paths:
      - frontend/Dockerfile
  only:
    - main
    - dev
    - testing-branch

deploy:frontend:push:
  <<: *docker_job_template
  stage: deploy
  needs: ["deploy:frontend:build"]
  script:
    - |
      IMAGE_TAG="${CI_COMMIT_REF_SLUG:-latest}"
      IMAGE_NAME="$DOCKER_USERNAME/vizor-frontend:$IMAGE_TAG"
      docker push "$IMAGE_NAME"
      docker push "$DOCKER_USERNAME/vizor-frontend:latest"
  only:
    - main
    - dev
    - testing-branch
