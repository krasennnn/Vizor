sonar.projectKey=vizor-frontend
sonar.projectName=Vizor Frontend
sonar.projectVersion=0.0.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.config.*,**/vite-env.d.ts

# Coverage (from E2E tests)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.coverage.exclusions=**/*.cy.ts,**/cypress/**,**/*.test.ts,**/*.spec.ts,**/main.tsx,**/vite-env.d.ts

# SonarCloud URL (can be overridden via SONAR_HOST_URL env var)
sonar.host.url=https://sonarcloud.io

