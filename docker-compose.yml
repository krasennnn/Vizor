# docker compose file for local development

version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: vizor-postgres
    environment:
      POSTGRES_DB: vizor
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: vizor2025
    ports:
      - "5433:5432"  # Match your current local port
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Flyway migrations will run automatically via Spring Boot
    networks:
      - vizor-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d vizor"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vizor-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vizor
      SPRING_DATASOURCE_USERNAME: dev
      SPRING_DATASOURCE_PASSWORD: vizor2025
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: true
      SPRING_FLYWAY_LOCATIONS: classpath:db/migration
      SPRING_APPLICATION_NAME: Vizor
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - vizor-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vizor-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vizor-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  vizor-network:
    driver: bridge

